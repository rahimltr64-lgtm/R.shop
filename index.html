<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الشامل | الـ 58 ولاية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --green: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--dark); color: var(--gold); padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        /* قائمة المنتجات */
        .product-list { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .product-card { background: #fff; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #eee; }
        .product-card:hover { transform: translateY(-8px); }
        .product-card img { width: 100%; height: 280px; object-fit: cover; }
        .product-info { padding: 20px; text-align: center; }
        .price-tag { color: var(--green); font-size: 24px; font-weight: 900; }
        .view-btn { background: var(--dark); color: var(--gold); border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }

        /* صفحة المنتج - الإصلاح هنا */
        #product-page { 
            display: none; 
            background: #fff; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100vh; /* ملء ارتفاع الشاشة */
            z-index: 200; 
            overflow-y: scroll; /* تفعيل التمرير العمودي */
            -webkit-overflow-scrolling: touch;
        }

        .back-btn { background: #f0f0f0; border: none; padding: 12px 25px; margin: 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .order-form { padding: 25px; background: #fafafa; border-radius: 25px; margin: 20px 0; border: 1px solid #eee; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-family: 'Cairo'; font-size: 16px; }
        .confirm-btn { background: var(--green); color: #fff; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 22px; font-weight: 900; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">🏦 متجر غيث الفاخر</h2>
    <p style="margin:5px 0 0; font-size:14px; opacity:0.8;">توصيل لـ 58 ولاية والدفع عند الاستلام</p>
</header>

<div class="container" id="main-view">
    <div class="product-list" id="list-container"></div>
</div>

<div id="product-page">
    <button class="back-btn" onclick="closeProduct()">⬅️ رجوع للمتجر</button>
    <div id="details-content" class="container"></div>
</div>

<script>
    const products = [
        { id: 1, name: "منتج رائع 1", price: 3500, image: "https://via.placeholder.com/500x400", desc: "وصف طويل للمنتج لضمان عمل التمرير... " + "نص مكرر ".repeat(20) },
        { id: 2, name: "منتج رائع 2", price: 5500, image: "https://via.placeholder.com/500x400", desc: "وصف مميز للمنتج الثاني." }
    ];

    const wilayas = ["01-أدرار", "02-الشلف", "03-الأغواط", "04-أم البواقي", "05-باتنة", "06-بجاية", "07-بسكرة", "08-بشار", "09-البليدة", "10-البويرة", "11-تمنراست", "12-تبسة", "13-تلمسان", "14-تيارت", "15-تيزي وزو", "16-الجزائر", "17-الجلفة", "18-جيجل", "19-سطيف", "20-سعيدة", "21-سكيكدة", "22-سيدي بلعباس", "23-عنابة", "24-قالمة", "25-قسنطينة", "26-المدية", "27-مستغانم", "28-المسيلة", "29-معسكر", "30-ورقلة", "31-وهران", "32-البيض", "33-إليزي", "34-برج بوعريريج", "35-بومرداس", "36-الطارف", "37-تندوف", "38-تسمسيلت", "39-الوادي", "40-خنشلة", "41-سوق أهراس", "42-تيبازة", "43-ميلة", "44-عين الدفلى", "45-النعامة", "46-عين تموشنت", "47-غرداية", "48-غليزان", "49-تيميمون", "50-برج باجي مختار", "51-أولاد جلال", "52-بني عباس", "53-إن صالح", "54-إن قزام", "55-تقرت", "56-جانت", "57-المغير", "58-المنيعة"];

    const listContainer = document.getElementById('list-container');
    products.forEach(p => {
        listContainer.innerHTML += `
            <div class="product-card" onclick="openProduct(${p.id})">
                <img src="${p.image}" alt="${p.name}">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <div class="price-tag">${p.price} دج</div>
                    <button class="view-btn">تفاصيل المنتج والطلب</button>
                </div>
            </div>
        `;
    });

    function openProduct(id) {
        const p = products.find(prod => prod.id === id);
        let wilayaOptions = `<option value="">-- اختر ولايتك --</option>`;
        wilayas.forEach(w => { wilayaOptions += `<option value="${w}">${w}</option>`; });

        document.getElementById('details-content').innerHTML = `
            <img src="${p.image}" style="width:100%; border-radius:25px;">
            <h1>${p.name}</h1>
            <p style="color:#666; line-height:1.8;">${p.desc}</p>
            <div style="font-size:28px; color:var(--green); font-weight:900;">السعر: ${p.price} دج</div>
            <div class="order-form">
                <h3>إستمارة الطلب</h3>
                <input type="text" id="custName" placeholder="الإسم واللقب">
                <input type="tel" id="custPhone" placeholder="رقم الهاتف">
                <select id="custWilaya">${wilayaOptions}</select>
                <button class="confirm-btn" onclick="sendOrder('${p.name}', ${p.price})">إرسال الطلب</button>
            </div>
        `;
        document.getElementById('product-page').style.display = 'block';
        document.body.style.overflow = 'hidden'; // منع تمرير الصفحة الخلفية
    }

    function closeProduct() {
        document.getElementById('product-page').style.display = 'none';
        document.body.style.overflow = 'auto'; // إعادة التمرير للصفحة الرئيسية
    }

    function sendOrder(pName, pPrice) {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const wilaya = document.getElementById('custWilaya').value;

        if(name && phone && wilaya) {
            const token = "8447738345:AAHgpNg_aRPIZAZRsg1tJ4OGjYqA7Tl0ZjM";
            const chat_id = "5981194410";
            const message = `👑 طلبية جديدة:\n📦 المنتج: ${pName}\n👤 العميل: ${name}\n📞 الهاتف: ${phone}\n📍 الولاية: ${wilaya}\n💰 السعر: ${pPrice} دج`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`)
            .then(() => { alert("تم استلام طلبك!"); closeProduct(); });
        } else { alert("يرجى إكمال البيانات"); }
    }
</script>

</body>
</html>
