<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Store | متجري الفاخر</title>
    <style>
        :root {
            --main-gold: #d4af37;
            --premium-black: #1a1a1a;
            --success-green: #27ae60;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: #333;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-bottom: 5px solid var(--main-gold);
        }

        .content { padding: 30px; }

        .price-tag {
            background: var(--premium-black);
            color: var(--main-gold);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .old-price { text-decoration: line-through; color: #999; font-size: 16px; margin-right: 10px; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--main-gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .total-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px solid #eee;
            text-align: center;
        }

        .order-btn {
            background: var(--success-green);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
            transition: 0.3s;
            animation: shake 3s infinite;
        }
