<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY STORE | متجر النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-light: #f1c40f; --dark: #050505; --card: #111; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--dark); color: var(--white); direction: rtl; overflow-x: hidden; }
        
        header { background: #111; padding: 25px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 30px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin: 0; }
        .container { max-width: 500px; margin: auto; padding: 20px; }

        /* شبكة المنتجات */
        .product-grid { display: grid; grid-template-columns: 1fr; gap: 25px; margin-top: 10px; }
        .p-card { background: var(--card); border-radius: 25px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .p-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .p-card img { width: 100%; height: 280px; object-fit: cover; }
        .p-card-info { padding: 20px; text-align: center; }
        .p-price { color: var(--gold); font-size: 26px; font-weight: 900; }

        /* صفحة تفاصيل المنتج */
        #product-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; overflow-y: auto; }
        .back-btn { margin: 15px; background: none; color: white; border: 1px solid var(--gold); padding: 8px 25px; border-radius: 50px; cursor: pointer; }
        
        .slider-box { width: 100%; height: 380px; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        .slider-box img { width: 100%; height: 100%; object-fit: cover; }
        .thumbs { display: flex; gap: 10px; margin-top: 12px; overflow-x: auto; padding: 5px; justify-content: center; }
        .thumb { width: 70px; height: 70px; border-radius: 12px; border: 2px solid #222; cursor: pointer; object-fit: cover; }
        .thumb.active { border-color: var(--gold); }

        /* استمارة الطلب */
        .order-section { background: #0c0c0c; border: 2px solid var(--gold); border-radius: 30px; padding: 25px; margin-top: 25px; margin-bottom: 60px; }
        input, select { width: 100%; padding: 16px; margin: 10px 0; background: #151515; border: 1px solid #333; color: white; border-radius: 15px; font-family: 'Cairo'; box-sizing: border-box; font-size: 16px; }
        .total-banner { background: rgba(212,175,55,0.15); border: 1px dashed var(--gold); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .buy-now-btn { background: linear-gradient(45deg, var(--gold), var(--gold-light)); color: black; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 22px; font-weight: 900; cursor: pointer; transition: 0.3s; }

        /* صفحة النجاح */
        .success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 5000; display: none; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<header><h1 class="logo">LUXURY STORE</h1></header>

<div class="container" id="home-view">
    <div class="product-grid" id="main-grid">
        </div>
</div>

<div id="product-page">
    <button class="back-btn" onclick="closeP()">⬅️ عودة للمتجر</button>
    <div id="p-content" class="container">
        </div>
</div>

<div class="success-overlay" id="successScreen">
    <div>
        <div style="font-size:100px; color:var(--gold);">🏆</div>
        <h1 style="color:var(--gold);">تم استلام طلبك!</h1>
        <p>شكراً لك يا <b><span id="clientName"></span></b>، سنتصل بك قريباً.</p>
        <button class="buy-now-btn" onclick="location.reload()" style="width:200px;">العودة</button>
    </div>
</div>

<script>
    const TOKEN = "8447738345:AAHgpNg_aRPIZAZRsg1tJ4OGjYqA7Tl0ZjM";
    const CHAT_ID = "5981194410";

    // 📦 قائمة المنتجات بـ "تعدد الصور"
    const products = [
        {
            id: 1,
            name: "ماكينة الحلاقة Kemei V-Gold",
            price: 3500,
            images: [
                "https://i.ibb.co/kg7mCQJT/H811569022fb24d11bda211ccb832607fk-jpg-960x960q80.jpg",
                "https://i.ibb.co/fYRprL0N/H4dc30437beeb48efaaba10e35e8f0d38-E-jpg-960x960q80.jpg"
            ],
            desc: "النسخة الأصلية الفاخرة، مثالية للحلاقة اليومية."
        },
        {
            id: 2,
            name: "ساعة فاخرة Edition 2026",
            price: 5500,
            images: [
                "https://i.ibb.co/gbgcdTVF/watch-luxury.jpg"
            ],
            desc: "ساعة كلاسيكية بتصميم ملكي جذاب."
        }
    ];

    // 📍 الـ 58 ولاية كاملة
    const wilayas = [
        {n: "01-أدرار", p: 1000}, {n: "02-الشلف", p: 600}, {n: "03-الأغواط", p: 700}, {n: "04-أم البواقي", p: 600}, {n: "05-باتنة", p: 600},
        {n: "06-بجاية", p: 600}, {n: "07-بسكرة", p: 600}, {n: "08-بشار", p: 1000}, {n: "09-البليدة", p: 450}, {n: "10-البويرة", p: 600},
        {n: "11-تمنراست", p: 1200}, {n: "12-تبسة", p: 600}, {n: "13-تلمسان", p: 700}, {n: "14-تيارت", p: 700}, {n: "15-تيزي وزو", p: 600},
        {n: "16-الجزائر العاصمة", p: 400}, {n: "17-الجلفة", p: 700}, {n: "18-جيجل", p: 600}, {n: "19-سطيف", p: 300}, {n: "20-سعيدة", p: 700},
        {n: "21-سكيكدة", p: 600}, {n: "22-سيدي بلعباس", p: 700}, {n: "23-عنابة", p: 600}, {n: "24-قالمة", p: 600}, {n: "25-قسنطينة", p: 500},
        {n: "26-المدية", p: 600}, {n: "27-مستغانم", p: 700}, {n: "28-المسيلة", p: 650}, {n: "29-معسكر", p: 700}, {n: "30-ورقلة", p: 800},
        {n: "31-وهران", p: 600}, {n: "32-البيض", p: 850}, {n: "33-إليزي", p: 1200}, {n: "34-برج بوعريريج", p: 500}, {n: "35-بومرداس", p: 500},
        {n: "36-الطارف", p: 650}, {n: "37-تندوف", p: 1200}, {n: "38-تسمسيلت", p: 700}, {n: "39-الوادي", p: 800}, {n: "40-خنشلة", p: 600},
        {n: "41-سوق أهراس", p: 650}, {n: "42-تيبازة", p: 500}, {n: "43-ميلة", p: 550}, {n: "44-عين الدفلى", p: 650}, {n: "45-النعامة", p: 850},
        {n: "46-عين تموشنت", p: 700}, {n: "47-غرداية", p: 800}, {n: "48-غليزان", p: 700}, {n: "49-تيميمون", p: 1000}, {n: "50-برج باجي مختار", p: 1500},
        {n: "51-أولاد جلال", p: 750}, {n: "52-بني عباس", p: 1000}, {n: "53-إن صالح", p: 1200}, {n: "54-إن قزام", p: 1500}, {n: "55-تقرت", p: 800},
        {n: "56-جانت", p: 1500}, {n: "57-المغير", p: 750}, {n: "58-المنيعة", p: 900}
    ];

    const grid = document.getElementById('main-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="p-card" onclick="openP(${p.id})">
                <img src="${p.images[0]}">
                <div class="p-card-info">
                    <h3>${p.name}</h3>
                    <div class="p-price">${p.price} دج</div>
                </div>
            </div>`;
    });

    let current = null;
    function openP(id) {
        current = products.find(x => x.id === id);
        let opts = `<option value="none">-- اختر ولايتك (58 ولاية) --</option>`;
        wilayas.forEach(w => opts += `<option value="${w.p}">${w.n}</option>`);

        document.getElementById('p-content').innerHTML = `
            <div class="slider-box"><img src="${current.images[0]}" id="activeImg"></div>
            <div class="thumbs">${current.images.map((img, i) => `<img src="${img}" class="thumb ${i===0?'active':''}" onclick="changeGallery(this, '${img}')">`).join('')}</div>
            <h2 style="text-align:center; margin-top:20px;">${current.name}</h2>
            <div class="order-section">
                <div class="total-banner">الإجمالي: <span id="finalPrice">${current.price}</span> دج</div>
                <input type="text" id="custN" placeholder="الإسم الكامل">
                <input type="tel" id="custPh" placeholder="رقم الهاتف">
                <select id="custW" onchange="const cost=this.value==='none'?0:parseInt(this.value); document.getElementById('finalPrice').innerText = ${current.price} + cost;">${opts}</select>
                <input type="text" id="custC" placeholder="البلدية">
                <button class="buy-now-btn" onclick="send()">تأكيد الطلب الآن</button>
            </div>`;
        document.getElementById('product-page').style.display = 'block';
    }

    function changeGallery(el, src) {
        document.getElementById('activeImg').src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function send() {
        const n = document.getElementById('custN').value;
        const ph = document.getElementById('custPh').value;
        const w_sel = document.getElementById('custW');
        const c = document.getElementById('custC').value;
        const tot = document.getElementById('finalPrice').innerText;

        if(n && ph && c && w_sel.value !== "none") {
            const msg = `👑 طلبية LUXURY جديدة:\n📦 المنتج: ${current.name}\n👤 العميل: ${n}\n📞 الهاتف: ${ph}\n📍 الولاية: ${w_sel.options[w_sel.selectedIndex].text}\n🏘️ البلدية: ${c}\n💰 الإجمالي: ${tot} دج`;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`)
            .then(res => {
                if(res.ok) {
                    document.getElementById('clientName').innerText = n;
                    document.getElementById('successScreen').style.display = 'flex';
                }
            });
        } else { alert("يرجى ملء كافة البيانات"); }
    }

    function closeP() { document.getElementById('product-page').style.display = 'none'; }
</script>
</body>
</html>
