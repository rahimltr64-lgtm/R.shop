<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY STORE | متجر النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: #111; --white: #fff; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--dark); color: var(--white); direction: rtl; }
        header { background: #111; padding: 25px; text-align: center; border-bottom: 2px solid var(--gold); box-shadow: 0 4px 20px rgba(212,175,55,0.2); }
        .logo { font-size: 30px; font-weight: 900; color: var(--gold); margin: 0; }
        .container { max-width: 480px; margin: auto; padding: 15px; }

        /* قائمة المنتجات */
        .product-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .p-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .p-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .p-card img { width: 100%; height: 260px; object-fit: cover; }
        .p-card-info { padding: 15px; text-align: center; }
        .p-price { color: var(--gold); font-size: 24px; font-weight: 900; }

        /* صفحة المنتج وتعدد الصور */
        #product-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 1000; overflow-y: auto; }
        .slider { position: relative; width: 100%; height: 350px; }
        .slider img { width: 100%; height: 100%; object-fit: cover; }
        .thumbs { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumb { width: 70px; height: 70px; border-radius: 10px; border: 1px solid #333; cursor: pointer; object-fit: cover; }

        /* استمارة الطلب */
        .order-box { background: #0a0a0a; padding: 20px; border-radius: 20px; border: 1px solid #222; margin-top: 20px; margin-bottom: 50px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; }
        .confirm-btn { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 20px; font-weight: 900; cursor: pointer; }
        .total-display { background: rgba(212,175,55,0.1); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--gold); margin-bottom: 15px; }
    </style>
</head>
<body>

<header><h1 class="logo">LUXURY STORE</h1></header>

<div class="container"><div class="product-grid" id="main-grid"></div></div>

<div id="product-page">
    <button onclick="closeP()" style="margin:15px; background:none; color:white; border:1px solid var(--gold); padding:8px 20px; border-radius:50px; cursor:pointer;">⬅️ عودة</button>
    <div id="p-content" class="container"></div>
</div>

<script>
    // 🛑 ضع بياناتك هنا
    const TOKEN = "8447738345:AAHgpNg_aRPIZAZRsg1tJ4OGjYqA7Tl0ZjM";
    const CHAT_ID = "5981194410";

    // 📦 قاعدة بيانات المنتجات (تعدد الصور باستخدام | )
    const products = [
        {
            id: 1,
            name: "ماكينة الحلاقة Kemei V-Gold",
            price: 3500,
            images: [
                "https://i.ibb.co/kg7mCQJT/H811569022fb24d11bda211ccb832607fk-jpg-960x960q80.jpg",
                "https://i.ibb.co/fYRprL0N/H4dc30437beeb48efaaba10e35e8f0d38-E-jpg-960x960q80.jpg"
            ],
            desc: "أفضل ماكينة حلاقة احترافية للرجال."
        },
        {
            id: 2,
            name: "ساعة فاخرة سوداء",
            price: 5500,
            images: ["https://i.ibb.co/gbgcdTVF/watch1.jpg", "https://i.ibb.co/vxyZ123/watch2.jpg"],
            desc: "ساعة أنيقة تناسب جميع المناسبات."
        }
    ];

    const wilayas = [
        {n: "01-أدرار", p: 1000}, {n: "02-الشلف", p: 600}, {n: "09-البليدة", p: 450}, {n: "16-الجزائر", p: 400}, {n: "19-سطيف", p: 300}, {n: "25-قسنطينة", p: 500}, {n: "31-وهران", p: 600}
        // ... (يمكنك إضافة باقي الـ 58 هنا بنفس التنسيق)
    ];

    const grid = document.getElementById('main-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="p-card" onclick="openP(${p.id})">
                <img src="${p.images[0]}">
                <div class="p-card-info">
                    <h3>${p.name}</h3>
                    <div class="p-price">${p.price} دج</div>
                </div>
            </div>`;
    });

    let current = null;
    function openP(id) {
        current = products.find(x => x.id === id);
        let opts = `<option value="0">-- اختر الولاية --</option>`;
        wilayas.forEach(w => opts += `<option value="${w.p}">${w.n}</option>`);

        document.getElementById('p-content').innerHTML = `
            <div class="slider"><img src="${current.images[0]}" id="mainImg"></div>
            <div class="thumbs">${current.images.map(img => `<img src="${img}" class="thumb" onclick="document.getElementById('mainImg').src='${img}'">`).join('')}</div>
            <h2>${current.name}</h2>
            <div class="order-box">
                <div class="total-display"><b>الإجمالي: <span id="finalP">${current.price}</span> دج</b></div>
                <input type="text" id="custN" placeholder="الإسم الكامل">
                <input type="tel" id="custPh" placeholder="رقم الهاتف">
                <select id="custW" onchange="document.getElementById('finalP').innerText = ${current.price} + (parseInt(this.value)||0)">${opts}</select>
                <input type="text" id="custC" placeholder="البلدية">
                <button class="confirm-btn" onclick="send()">تأكيد الطلب الآن</button>
            </div>`;
        document.getElementById('product-page').style.display = 'block';
    }

    function send() {
        const n = document.getElementById('custN').value;
        const ph = document.getElementById('custPh').value;
        const w_sel = document.getElementById('custW');
        const c = document.getElementById('custC').value;
        const tot = document.getElementById('finalP').innerText;

        if(n && ph && c && w_sel.value !== "0") {
            const msg = `👑 طلب جديد:\n📦 المنتج: ${current.name}\n👤 العميل: ${n}\n📞 الهاتف: ${ph}\n📍 الولاية: ${w_sel.options[w_sel.selectedIndex].text}\n🏘️ البلدية: ${c}\n💰 الإجمالي: ${tot} دج`;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`)
            .then(res => { if(res.ok) { alert("✅ تم الطلب!"); location.reload(); } });
        } else { alert("يرجى إكمال البيانات"); }
    }

    function closeP() { document.getElementById('product-page').style.display = 'none'; }
</script>
</body>
</html>
