<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY STORE | الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --card: #151515;
            --text: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; background-color: var(--dark); color: var(--text);
            direction: rtl; text-align: right;
        }

        header {
            padding: 30px; text-align: center;
            background: linear-gradient(180deg, #1a1a1a, #0a0a0a);
            border-bottom: 2px solid var(--gold);
        }

        .logo { font-size: 30px; font-weight: 900; color: var(--gold); margin: 0; }

        .container { max-width: 480px; margin: auto; padding: 15px; }

        /* الكروت */
        .product-card {
            background: var(--card); border-radius: 20px; overflow: hidden;
            margin-bottom: 30px; border: 1px solid #222; cursor: pointer;
        }

        .product-card img { width: 100%; height: 300px; object-fit: cover; }
        
        .p-info { padding: 20px; text-align: center; }
        .price { color: var(--gold); font-size: 26px; font-weight: 900; }

        /* صفحة المنتج */
        #product-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%;
            height: 100%; background: var(--dark); z-index: 9999; overflow-y: auto;
        }

        .back-btn {
            background: none; color: white; border: 1px solid var(--gold);
            padding: 10px 25px; margin: 15px; border-radius: 50px; cursor: pointer;
        }

        /* الاستمارة */
        .order-form {
            background: #111; padding: 20px; border-radius: 20px;
            border: 1px solid #333; margin-top: 20px;
        }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #333;
            color: white; border-radius: 12px; font-family: 'Cairo';
            box-sizing: border-box; font-size: 16px;
        }

        .confirm-btn {
            background: var(--gold); color: black; border: none;
            padding: 18px; width: 100%; border-radius: 12px;
            font-size: 20px; font-weight: 900; cursor: pointer;
        }

        .total-box {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold);
            padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">LUXURY STORE</h1>
</header>

<div class="container" id="main-view">
    <div id="list-container"></div>
</div>

<div id="product-page">
    <button class="back-btn" onclick="closeProduct()">⬅️ عودة</button>
    <div id="details-content" class="container"></div>
</div>

<script>
    // 1. البيانات (عدل هنا فقط)
    const botToken = "ضـع_تـوكـن_الـبـوت_هـنـا";
    const chatId = "ضـع_الآيـدي_الـخـاص_بـك";

    const products = [
        {
            id: 1,
            name: "ماكينة الحلاقة Kemei KM-2024",
            price: 3500,
            image: "https://i.ibb.co/kg7mCQJT/H811569022fb24d11bda211ccb832607fk-jpg-960x960q80.jpg",
            desc: "حلاقة ناعمة واحترافية. النسخة الأصلية."
        }
    ];

    const wilayas = [
        {n: "16-الجزائر", p: 400}, {n: "19-سطيف", p: 300}, {n: "25-قسنطينة", p: 500},
        {n: "31-وهران", p: 600}, {n: "06-بجاية", p: 500}, {n: "05-باتنة", p: 500}
        // أضف البقية بنفس التنسيق
    ];

    // 2. عرض المنتجات
    const list = document.getElementById('list-container');
    products.forEach(p => {
        list.innerHTML += `
            <div class="product-card" onclick="openProduct(${p.id})">
                <img src="${p.image}">
                <div class="p-info">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} دج</div>
                </div>
            </div>`;
    });

    let currentP = null;

    function openProduct(id) {
        currentP = products.find(x => x.id === id);
        let options = `<option value="0">-- اختر الولاية --</option>`;
        wilayas.forEach(w => { options += `<option value="${w.p}">${w.n}</option>`; });

        document.getElementById('details-content').innerHTML = `
            <img src="${currentP.image}" style="width:100%; border-radius:15px;">
            <h2 style="text-align:center;">${currentP.name}</h2>
            <p style="text-align:center; color:#aaa;">${currentP.desc}</p>
            <div class="order-form">
                <div class="total-box">
                    <div style="font-size:22px; font-weight:900;">الإجمالي: <span id="totalV">${currentP.price}</span> دج</div>
                </div>
                <input type="text" id="custName" placeholder="الإسم الكامل">
                <input type="tel" id="custPhone" placeholder="رقم الهاتف">
                <select id="custWilaya" onchange="document.getElementById('totalV').innerText = ${currentP.price} + parseInt(this.value)">
                    ${options}
                </select>
                <input type="text" id="custCommune" placeholder="البلدية">
                <button class="confirm-btn" onclick="sendToTelegram()">تأكيد الطلب</button>
            </div>`;
        document.getElementById('product-page').style.display = 'block';
    }

    function sendToTelegram() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const wilayaSelect = document.getElementById('custWilaya');
        const wilayaText = wilayaSelect.options[wilayaSelect.selectedIndex].text;
        const commune = document.getElementById('custCommune').value;
        const total = document.getElementById('totalV').innerText;

        if(name && phone && commune && wilayaSelect.value !== "0") {
            const msg = `🚀 طلب جديد:\nالمنتج: ${currentP.name}\nالاسم: ${name}\nالهاتف: ${phone}\nالولاية: ${wilayaText}\nالبلدية: ${commune}\nالإجمالي: ${total} دج`;
            
            fetch(`https://api.telegram.org/bot${8447738345:AAHgpNg_aRPIZAZRsg1tJ4OGjYqA7Tl0ZjM}/sendMessage?chat_id=${5981194410}&text=${encodeURIComponent(msg)}`)
            .then(() => {
                document.getElementById('details-content').innerHTML = `
                    <div style="text-align:center; padding:50px 0;">
                        <h1 style="color:var(--gold);">✅ شكراً لك!</h1>
                        <p>تم استلام طلبك بنجاح. سنتصل بك قريباً.</p>
                        <button class="confirm-btn" onclick="location.reload()">العودة</button>
                    </div>`;
            });
        } else {
            alert("يرجى إكمال البيانات");
        }
    }

    function closeProduct() { document.getElementById('product-page').style.display = 'none'; }
</script>
</body>
</html>
