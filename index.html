<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background-color: var(--dark); color: white; direction: rtl; }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); background: #111; }
        .container { max-width: 450px; margin: auto; padding: 15px; }
        .product-card { background: #151515; border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #222; text-align: center; cursor: pointer; }
        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        #product-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 1000; overflow-y: auto; }
        .order-form { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; font-family: 'Cairo'; box-sizing: border-box; }
        .confirm-btn { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: 900; cursor: pointer; }
        .price-tag { color: var(--gold); font-size: 22px; font-weight: 900; margin: 10px 0; }
    </style>
</head>
<body>

<header><h1>LUXURY STORE</h1></header>

<div class="container" id="main-view">
    <div class="product-card" onclick="openProduct()">
        <img src="https://i.ibb.co/kg7mCQJT/H811569022fb24d11bda211ccb832607fk-jpg-960x960q80.jpg">
        <div style="padding:15px;">
            <h3>ماكينة الحلاقة Kemei V-Gold</h3>
            <div class="price-tag">3500 دج</div>
            <button class="confirm-btn">اطلب الآن</button>
        </div>
    </div>
</div>

<div id="product-page">
    <button onclick="document.getElementById('product-page').style.display='none'" style="margin:15px; color:white; background:none; border:1px solid var(--gold); padding:5px 15px; border-radius:20px;">⬅️ عودة</button>
    <div class="container">
        <img src="https://i.ibb.co/kg7mCQJT/H811569022fb24d11bda211ccb832607fk-jpg-960x960q80.jpg" style="width:100%; border-radius:15px;">
        <div class="order-form">
            <h2 style="text-align:center; color:var(--gold);">تأكيد الطلب</h2>
            <div style="text-align:center; margin-bottom:10px;">الإجمالي: <span id="totalV">3500</span> دج</div>
            
            <input type="text" id="name" placeholder="الإسم الكامل">
            <input type="tel" id="phone" placeholder="رقم الهاتف">
            
            <select id="wilaya" onchange="updatePrice()">
                <option value="0" selected disabled>-- اختر الولاية (58 ولاية) --</option>
                <option value="1000">01-أدرار</option><option value="600">02-الشلف</option><option value="700">03-الأغواط</option><option value="600">04-أم البواقي</option><option value="600">05-باتنة</option>
                <option value="600">06-بجاية</option><option value="600">07-بسكرة</option><option value="1000">08-بشار</option><option value="450">09-البليدة</option><option value="600">10-البويرة</option>
                <option value="1200">11-تمنراست</option><option value="600">12-تبسة</option><option value="700">13-تلمسان</option><option value="700">14-تيارت</option><option value="600">15-تيزي وزو</option>
                <option value="400">16-الجزائر العاصمة</option><option value="700">17-الجلفة</option><option value="600">18-جيجل</option><option value="300">19-سطيف</option><option value="700">20-سعيدة</option>
                <option value="600">21-سكيكدة</option><option value="700">22-سيدي بلعباس</option><option value="600">23-عنابة</option><option value="600">24-قالمة</option><option value="500">25-قسنطينة</option>
                <option value="600">26-المدية</option><option value="700">27-مستغانم</option><option value="650">28-المسيلة</option><option value="700">29-معسكر</option><option value="800">30-ورقلة</option>
                <option value="600">31-وهران</option><option value="850">32-البيض</option><option value="1200">33-إليزي</option><option value="500">34-برج بوعريريج</option><option value="500">35-بومرداس</option>
                <option value="650">36-الطارف</option><option value="1200">37-تندوف</option><option value="700">38-تسمسيلت</option><option value="800">39-الوادي</option><option value="600">40-خنشلة</option>
                <option value="650">41-سوق أهراس</option><option value="500">42-تيبازة</option><option value="550">43-ميلة</option><option value="650">44-عين الدفلى</option><option value="850">45-النعامة</option>
                <option value="700">46-عين تموشنت</option><option value="800">47-غرداية</option><option value="700">48-غليزان</option><option value="1000">49-تيميمون</option><option value="1500">50-برج باجي مختار</option>
                <option value="750">51-أولاد جلال</option><option value="1000">52-بني عباس</option><option value="1200">53-إن صالح</option><option value="1500">54-إن قزام</option><option value="800">55-تقرت</option>
                <option value="1500">56-جانت</option><option value="750">57-المغير</option><option value="900">58-المنيعة</option>
            </select>
            
            <input type="text" id="commune" placeholder="البلدية">
            <button class="confirm-btn" onclick="sendOrder()">إتمام الطلب</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ استبدل هذه القيم ببياناتك الحقيقية
    const TOKEN = "8447738345:AAHgpNg_aRPIZAZRsg1tJ4OGjYqA7Tl0ZjM";
    const CHAT_ID = "5981194410";

    function openProduct() {
        document.getElementById('product-page').style.display = 'block';
    }

    function updatePrice() {
        const ship = parseInt(document.getElementById('wilaya').value);
        document.getElementById('totalV').innerText = 3500 + ship;
    }

    function sendOrder() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        const w_sel = document.getElementById('wilaya');
        const c = document.getElementById('commune').value;
        const t = document.getElementById('totalV').innerText;

        if(n && p && c && w_sel.value != "0") {
            const w_txt = w_sel.options[w_sel.selectedIndex].text;
            const msg = `👑 طلب جديد:\n👤 الاسم: ${n}\n📞 الهاتف: ${p}\n📍 الولاية: ${w_txt}\n🏘️ البلدية: ${c}\n💰 الإجمالي: ${t} دج`;
            
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`;
            
            fetch(url).then(res => {
                if(res.ok) {
                    alert("✅ تم استلام طلبك بنجاح!");
                    location.reload();
                } else {
                    alert("❌ خطأ في إرسال البيانات (تأكد من التوكن والآيدي)");
                }
            }).catch(() => alert("تأكد من اتصالك بالإنترنت"));
        } else {
            alert("يرجى ملء جميع الخانات");
        }
    }
</script>
</body>
</html>
