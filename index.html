<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Store | متجري الفاخر</title>
    <style>
        :root {
            --main-gold: #d4af37;
            --premium-black: #1a1a1a;
            --success-green: #27ae60;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: #333;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-bottom: 5px solid var(--main-gold);
        }

        .content { padding: 30px; }

        .price-tag {
            background: var(--premium-black);
            color: var(--main-gold);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .old-price { text-decoration: line-through; color: #999; font-size: 16px; margin-right: 10px; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--main-gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .total-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px solid #eee;
            text-align: center;
        }

        .order-btn {
            background: var(--success-green);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
            transition: 0.3s;
            animation: shake 3s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .order-btn:hover { transform: scale(1.02); background: #2ecc71; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <img src="ضع_رابط_الصورة_هنا" alt="Premium Product" class="product-img">
    
    <div class="content">
        <h2 style="margin:0; font-weight:900;">ساعة رجالية فخمة  </h2>

        <div class="price-tag">

        </div>

        <div class="total-box">
            <div style="font-size:14px; color:#888;">سعر التوصيل: <span id="delPrice">0</span> دج</div>
            <div style="font-size:22px; font-weight:bold;">الإجمالي: <span id="totalPrice">3500</span> دج</div>
        </div>

        <button class="order-btn" onclick="sendToTelegram()">تأكيد الطلب الآن</button>
    </div>
</div>

<script>
    const itemCost = 3500; // عدل سعر المنتج هنا

    function updateTotal() {
        const select = document.getElementById('wilaya');
        const delivery = parseInt(select.options[select.selectedIndex].getAttribute('data-price')) || 0;
        document.getElementById('delPrice').innerText = delivery;
        document.getElementById('totalPrice').innerText = itemCost + delivery;
    }

    function sendToTelegram() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const wilaya = document.getElementById('wilaya').options[document.getElementById('wilaya').selectedIndex].text;
        const total = document.getElementById('totalPrice').innerText;

        if(name && phone && document.getElementById('wilaya').value != "") {
            const token = "8447738345:AAHgpNg_aRPIZAZRsg1tJ4OGjYqA7Tl0ZjM"; 
            const chat_id = "5981194410";
            const msg = `👑 طلبية VIP جديدة:\n\n👤 العميل: ${name}\n📞 الهاتف: ${phone}\n📍 الولاية: ${wilaya}\n💰 المبلغ المطلوب: ${total} دج`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`)
            .then(() => alert("تم إرسال طلبك بنجاح! سنتصل بك فوراً."));
        } else {
            alert("يرجى إدخال جميع المعلومات واختيار الولاية");
        }
    }
</script>

</body>
</html>
