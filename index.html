<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY STORE | متجر الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #141414;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: var(--dark-bg);
            color: var(--text-color);
            direction: rtl;
        }

        header {
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .container { max-width: 500px; margin: auto; padding: 15px; }

        /* المنتجات */
        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .product-card img { width: 100%; height: 280px; object-fit: cover; }
        .product-info { padding: 15px; text-align: center; }
        .price { color: var(--gold); font-size: 26px; font-weight: 900; }

        /* صفحة الطلب */
        #product-page {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--dark-bg);
            z-index: 1000;
            overflow-y: auto;
        }

        .order-form {
            background: #111;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #333;
            margin-top: 15px;
        }

        .total-box {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            font-family: 'Cairo';
            box-sizing: border-box;
        }

        .btn-confirm {
            background: linear-gradient(90deg, #d4af37, #f1c40f);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
        }

        .back-btn {
            background: none;
            color: white;
            border: 1px solid var(--gold);
            padding: 8px 20px;
            margin: 15px;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">LUXURY STORE</h1>
    <p style="font-size:12px; color:var(--gold);">كل ما يحتاجه الرجل الجزائري الأنيق</p>
</header>

<div class="container" id="main-view">
    <div id="list-container"></div>
</div>

<div id="product-page">
    <button class="back-btn" onclick="closeProduct()">⬅️ عودة</button>
    <div id="details-content" class="container"></div>
</div>

<script>
    // 1. قائمة المنتجات (أضف منتجاتك هنا)
    const myProducts = [
        {
            id: 1,
            name: "ماكينة الحلاقة Kemei KM-2024",
            price: 3500,
            image: "https://i.ibb.co/kg7mCQJT/H811569022fb24d11bda211ccb832607fk-jpg-960x960q80.jpg",
            description: "النسخة الأصلية الاحترافية، مثالية للحلاقة اليومية وتحديد اللحية."
        }
    ];

    // 2. قائمة الـ 58 ولاية بأسعار الشحن التقريبية (يمكنك تعديل الأسعار هنا)
    const myShipping = [
        {name: "01-أدرار", cost: 1000}, {name: "02-الشلف", cost: 600}, {name: "03-الأغواط", cost: 700}, {name: "04-أم البواقي", cost: 600}, {name: "05-باتنة", cost: 600},
        {name: "06-بجاية", cost: 600}, {name: "07-بسكرة", cost: 600}, {name: "08-بشار", cost: 1000}, {name: "09-البليدة", cost: 500}, {name: "10-البويرة", cost: 600},
        {name: "11-تمنراست", cost: 1200}, {name: "12-تبسة", cost: 600}, {name: "13-تلمسان", cost: 700}, {name: "14-تيارت", cost: 700}, {name: "15-تيزي وزو", cost: 600},
        {name: "16-الجزائر العاصمة", cost: 400}, {name: "17-الجلفة", cost: 700}, {name: "18-جيجل", cost: 600}, {name: "19-سطيف", cost: 500}, {name: "20-سعيدة", cost: 700},
        {name: "21-سكيكدة", cost: 600}, {name: "22-سيدي بلعباس", cost: 700}, {name: "23-عنابة", cost: 600}, {name: "24-قالمة", cost: 600}, {name: "25-قسنطينة", cost: 500},
        {name: "26-المدية", cost: 600}, {name: "27-مستغانم", cost: 700}, {name: "28-المسيلة", cost: 650}, {name: "29-معسكر", cost: 700}, {name: "30-ورقلة", cost: 800},
        {name: "31-وهران", cost: 600}, {name: "32-البيض", cost: 850}, {name: "33-إليزي", cost: 1200}, {name: "34-برج بوعريريج", cost: 500}, {name: "35-بومرداس", cost: 500},
        {name: "36-الطارف", cost: 650}, {name: "37-تندوف", cost: 1200}, {name: "38-تسمسيلت", cost: 700}, {name: "39-الوادي", cost: 800}, {name: "40-خنشلة", cost: 600},
        {name: "41-سوق أهراس", cost: 650}, {name: "42-تيبازة", cost: 500}, {name: "43-ميلة", cost: 550}, {name: "44-عين الدفلى", cost: 650}, {name: "45-النعامة", cost: 850},
        {name: "46-عين تموشنت", cost: 700}, {name: "47-غرداية", cost: 800}, {name: "48-غليزان", cost: 700}, {name: "49-تيميمون", cost: 1000}, {name: "50-برج باجي مختار", cost: 1500},
        {name: "51-أولاد جلال", cost: 750}, {name: "52-بني عباس", cost: 1000}, {name: "53-إن صالح", cost: 1200}, {name: "54-إن قزام", cost: 1500}, {name: "55-تقرت", cost: 800},
        {name: "56-جانت", cost: 1500}, {name: "57-المغير", cost: 750}, {name: "58-المنيعة", cost: 900}
    ];

    // 3. معلومات تلغرام
    const botToken = "8447738345:AAHgpNg_aRPIZAZRsg1tJ4OGjYqA7Tl0ZjM";
    const chatId = "5981194410";

    const listDiv = document.getElementById('list-container');
    function render() {
        myProducts.forEach(p => {
            listDiv.innerHTML += `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <img src="${p.image}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} دج</div>
                    </div>
                </div>`;
        });
    }

    let activeP = null;
    function openProduct(id) {
        activeP = myProducts.find(p => p.id === id);
        let options = `<option value="none">-- اختر ولايتك --</option>`;
        myShipping.forEach(s => { options += `<option value="${s.cost}">${s.name}</option>`; });

        document.getElementById('details-content').innerHTML = `
            <img src="${activeP.image}" style="width:100%; border-radius:15px; border:1px solid var(--gold);">
            <h2 style="text-align:center;">${activeP.name}</h2>
            <div class="order-form">
                <div class="total-box">
                    <div style="font-size:24px; font-weight:900;">الإجمالي: <span id="finalPrice">${activeP.price}</span> دج</div>
                    <div style="font-size:12px; opacity:0.7;">توصيل: <span id="shipPrice">0</span> دج</div>
                </div>
                <input type="text" id="cName" placeholder="الإسم الكامل">
                <input type="tel" id="cPhone" placeholder="رقم الهاتف">
                <select id="cWilaya" onchange="updateTotal()">${options}</select>
                <input type="text" id="cCommune" placeholder="البلدية">
                <input type="text" id="cAddress" placeholder="العنوان الدقيق (اختياري)">
                <button class="btn-confirm" onclick="confirmOrder()">تأكيد الطلب</button>
            </div>`;
        document.getElementById('product-page').style.display = 'block';
    }

    function updateTotal() {
        const cost = document.getElementById('cWilaya').value;
        if(cost !== "none") {
            document.getElementById('finalPrice').innerText = activeP.price + parseInt(cost);
            document.getElementById('shipPrice').innerText = cost;
        }
    }

    function confirmOrder() {
        const name = document.getElementById('cName').value;
        const phone = document.getElementById('cPhone').value;
        const wilaya = document.getElementById('cWilaya');
        const commune = document.getElementById('cCommune').value;

        if(name && phone && commune && wilaya.value !== "none") {
            const msg = `👑 طلبية LUXURY:\n📦 المنتج: ${activeP.name}\n👤 العميل: ${name}\n📞 الهاتف: ${phone}\n📍 الولاية: ${wilaya.options[wilaya.selectedIndex].text}\n🏘️ البلدية: ${commune}\n💰 السعر: ${document.getElementById('finalPrice').innerText} دج`;
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`)
            .then(() => {
                document.getElementById('details-content').innerHTML = `
                    <div style="text-align:center; padding:50px 0;">
                        <h1 style="color:var(--gold);">✅ شكراً لك!</h1>
                        <p>تم استلام طلبك يا ${name}. سنتصل بك قريباً.</p>
                        <button class="btn-confirm" onclick="location.reload()">العودة للمتجر</button>
                    </div>`;
            });
        } else {
            alert("يرجى ملء الاسم، الهاتف، الولاية والبلدية.");
        }
    }

    function closeProduct() { document.getElementById('product-page').style.display = 'none'; }
    render();
</script>
</body>
</html>
