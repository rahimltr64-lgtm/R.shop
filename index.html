<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY STORE | متجر الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-secondary: #f1c40f;
            --dark-bg: #0a0a0a;
            --dark-card: #141414;
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            color: var(--gold-primary);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold-primary);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
        }

        .container { max-width: 600px; margin: auto; padding: 20px; }

        .product-list { display: grid; grid-template-columns: 1fr; gap: 25px; }
        
        .product-card {
            background: var(--dark-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.4s ease;
            cursor: pointer;
        }

        .product-card:hover { transform: translateY(-10px); border-color: var(--gold-primary); }

        .product-card img { width: 100%; height: 280px; object-fit: cover; }

        .product-info { padding: 20px; text-align: center; }
        .price-tag { color: var(--gold-primary); font-size: 26px; font-weight: 900; display: block; margin-bottom: 15px; }

        .view-btn {
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-secondary));
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
        }

        #product-page {
            display: none;
            background: var(--dark-bg);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            overflow-y: auto;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid var(--gold-primary);
            padding: 10px 20px;
            margin: 20px;
            border-radius: 50px;
            cursor: pointer;
        }

        .thumbnails-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .thumb-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .thumb-img:hover { border-color: var(--gold-primary); }

        .order-form {
            background: #111;
            padding: 25px;
            border-radius: 25px;
            border: 1px solid #333;
            margin-top: 30px;
            margin-bottom: 40px;
        }

        .total-card {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--gold-primary);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .total-amount { font-size: 28px; color: var(--gold-secondary); font-weight: 900; }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-family: 'Cairo';
            font-size: 16px;
        }

        .confirm-btn {
            background: var(--gold-primary);
            color: #000;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 15px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">LUXURY STORE</h2>
    <p style="color: rgba(255,255,255,0.6); margin:5px 0 0; font-size:14px;">تميزك يبدأ من هنا</p>
</header>

<div class="container" id="main-view">
    <div class="product-list" id="list-container"></div>
</div>

<div id="product-page">
    <button class="back-btn" onclick="closeProduct()">⬅️ عودة للمتجر</button>
    <div id="details-content" class="container"></div>
</div>

<script>
    // بيانات منتجك المختار من "سوقلي" بالروابط المصححة
    const products = [
        { 
            id: 1, 
            name: "ماكينة الحلاقة الملكية Kemei KM-2024", 
            price: 3500, 
            images: [
                "https://i.ibb.co/kg7mCQJT/H811569022fb24d11bda211ccb832607fk-jpg-960x960q80.jpg",
                "https://i.ibb.co/fYRprL0N/H4dc30437beeb48efaaba10e35e8f0d38-E-jpg-960x960q80.jpg",
                "https://i.ibb.co/PZGvQ6gt/7e69dfb1609a0651a6761fbfdcb28788.jpg"
            ], 
            desc: "الرفيق المثالي للرجل العصري.. تصميم أسود فاخر، حجم محمول، وأداء احترافي. حلاقة ناعمة في أي وقت وأي مكان." 
        }
    ];

    // قائمة الولايات بأسعار الشحن المعتمدة في سوقلي (سعر التوصيل للمنزل)
    const wilayas = [
        {n: "01-أدرار", p: 1000}, {n: "02-الشلف", p: 600}, {n: "03-الأغواط", p: 700}, {n: "04-أم البواقي", p: 600}, {n: "05-باتنة", p: 600}, 
        {n: "06-بجاية", p: 600}, {n: "07-بسكرة", p: 600}, {n: "08-بشار", p: 1000}, {n: "09-البليدة", p: 500}, {n: "10-البويرة", p: 600},
        {n: "11-تمنراست", p: 1200}, {n: "12-تبسة", p: 600}, {n: "13-تلمسان", p: 700}, {n: "14-تيارت", p: 700}, {n: "15-تيزي وزو", p: 600},
        {n: "16-الجزائر العاصمة", p: 400}, {n: "17-الجلفة", p: 700}, {n: "18-جيجل", p: 600}, {n: "19-سطيف", p: 500}, {n: "20-سعيدة", p: 700},
        {n: "21-سكيكدة", p: 600}, {n: "22-سيدي بلعباس", p: 700}, {n: "23-عنابة", p: 600}, {n: "24-قالمة", p: 600}, {n: "25-قسنطينة", p: 500},
        {n: "26-المدية", p: 600}, {n: "27-مستغانم", p: 700}, {n: "28-المسيلة", p: 650}, {n: "29-معسكر", p: 700}, {n: "30-ورقلة", p: 800},
        {n: "31-وهران", p: 600}, {n: "32-البيض", p: 850}, {n: "33-إليزي", p: 1200}, {n: "34-برج بوعريريج", p: 500}, {n: "35-بومرداس", p: 500},
        {n: "36-الطارف", p: 650}, {n: "37-تندوف", p: 1200}, {n: "38-تسمسيلت", p: 700}, {n: "39-الوادي", p: 800}, {n: "40-خنشلة", p: 600},
        {n: "41-سوق أهراس", p: 650}, {n: "42-تيبازة", p: 500}, {n: "43-ميلة", p: 550}, {n: "44-عين الدفلى", p: 650}, {n: "45-النعامة", p: 850},
        {n: "46-عين تموشنت", p: 700}, {n: "47-غرداية", p: 800}, {n: "48-غليزان", p: 700}, {n: "49-تيميمون", p: 1000}, {n: "50-برج باجي مختار", p: 1500},
        {n: "51-أولاد جلال", p: 750}, {n: "52-بني عباس", p: 1000}, {n: "53-إن صالح", p: 1200}, {n: "54-إن قزام", p: 1500}, {n: "55-تقرت", p: 800},
        {n: "56-جانت", p: 1500}, {n: "57-المغير", p: 750}, {n: "58-المنيعة", p: 900}
    ];

    const listContainer = document.getElementById('list-container');
    products.forEach(p => {
        listContainer.innerHTML += `
            <div class="product-card" onclick="openProduct(${p.id})">
                <img src="${p.images[0]}" alt="${p.name}">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <span class="price-tag">${p.price} دج</span>
                    <button class="view-btn">تفاصيل الطلب</button>
                </div>
            </div>`;
    });

    let activeP = null;

    function openProduct(id) {
        activeP = products.find(prod => prod.id === id);
        let options = `<option value="0">-- اختر ولايتك --</option>`;
        wilayas.forEach(w => { options += `<option value="${w.p}">${w.n}</option>`; });

        let galleryHTML = `<img src="${activeP.images[0]}" id="mainImg" style="width:100%; border-radius:20px; border: 1px solid var(--gold-primary);">`;
        if(activeP.images.length > 1) {
            galleryHTML += `<div class="thumbnails-container">`;
            activeP.images.forEach(img => {
                galleryHTML += `<img src="${img}" class="thumb-img" onclick="document.getElementById('mainImg').src='${img}'">`;
            });
            galleryHTML += `</div>`;
        }

        document.getElementById('details-content').innerHTML = `
            ${galleryHTML}
            <h1 style="color:var(--gold-primary); text-align:center; margin-top:20px;">${activeP.name}</h1>
            <p style="color:#bbb; line-height:1.8; text-align:center;">${activeP.desc}</p>
            <div class="order-form">
                <div class="total-card">
                    <div>سعر المنتج: <b>${activeP.price} دج</b></div>
                    <div style="margin:5px 0;">تكلفة الشحن: <b id="delVal">0</b> دج</div>
                    <div class="total-amount">الإجمالي: <span id="totalVal">${activeP.price}</span> دج</div>
                </div>
                <input type="text" id="custName" placeholder="الاسم الكامل">
                <input type="tel" id="custPhone" placeholder="رقم الهاتف">
                <select id="custWilaya" onchange="updatePrice()">${options}</select>
                <button class="confirm-btn" onclick="sendOrder()">تأكيد الطلب الفاخر</button>
            </div>`;
        document.getElementById('product-page').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function updatePrice() {
        const delivery = parseInt(document.getElementById('custWilaya').value);
        document.getElementById('delVal').innerText = delivery;
        document.getElementById('totalVal').innerText = activeP.price + delivery;
    }

    function closeProduct() {
        document.getElementById('product-page').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const wilayaSel = document.getElementById('custWilaya');
        const total = document.getElementById('totalVal').innerText;

        if(name && phone && wilayaSel.value != "0") {
            const token = "8447738345:AAHgpNg_aRPIZAZRsg1tJ4OGjYqA7Tl0ZjM";
            const chat_id = "5981194410";
            const message = `👑 طلبية LUXURY:\n📦 المنتج: ${activeP.name}\n👤 العميل: ${name}\n📞 الهاتف: ${phone}\n📍 الولاية: ${wilayaSel.options[wilayaSel.selectedIndex].text}\n💰 الإجمالي: ${total} دج`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`)
            .then(() => { alert("تم استلام طلبك بنجاح!"); closeProduct(); });
        } else { alert("يرجى إكمال البيانات"); }
    }
</script>
</body>
</html>
